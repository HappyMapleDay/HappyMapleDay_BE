name: Deploy to Dev Environment

on:
  push:
    branches: [ dev ]

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew build -x test
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Docker images (Dev)
      run: |
        # ARM64 플랫폼으로 빌드 (QEMU를 통한 에뮬레이션)
        # 소문자로 변환하여 Docker 태그 규칙 준수
        REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-admin:dev -f ./admin-service/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-boss:dev -f ./boss-service/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-character:dev -f ./character-service/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-gateway:dev -f ./gateway/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-recommendation:dev -f ./recommendation-service/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-settlement:dev -f ./settlement-service/Dockerfile . --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-user:dev -f ./user-service/Dockerfile . --push
        
    - name: Setup SSH (Dev)
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.OCI_SSH_PRIVATE_KEY_DEV }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.OCI_APP_IP_DEV }} >> ~/.ssh/known_hosts
        
    - name: Deploy to OCI via SSH (Dev)
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_SSH_USER_DEV }}@${{ secrets.OCI_APP_IP_DEV }} << EOF
          # 애플리케이션 디렉토리로 이동
          cd /app
          
          # docker-compose.yml 다운로드
          curl -o docker-compose.yml https://raw.githubusercontent.com/HappyMapleDay/HappyMapleDay_BE/dev/docker-compose.yml
          
          # 기존 컨테이너 중지
          docker-compose down
          
          # GitHub Container Registry에서 최신 이미지 다운로드 (dev 태그)
          # 소문자로 변환하여 Docker 태그 규칙 준수
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${REPO_NAME}/happymapleday-admin:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-boss:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-character:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-gateway:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-recommendation:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-settlement:dev
          docker pull ghcr.io/${REPO_NAME}/happymapleday-user:dev
          
          # 이미지 태그 변경 (docker-compose.yml과 일치시키기)
          docker tag ghcr.io/${REPO_NAME}/happymapleday-admin:dev happymapleday-admin:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-boss:dev happymapleday-boss:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-character:dev happymapleday-character:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-gateway:dev happymapleday-gateway:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-recommendation:dev happymapleday-recommendation:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-settlement:dev happymapleday-settlement:latest
          docker tag ghcr.io/${REPO_NAME}/happymapleday-user:dev happymapleday-user:latest
          
          # 컨테이너 시작
          docker-compose up -d
          
          # 배포 상태 확인
          docker-compose ps
          echo "Dev Deployment completed successfully!"
        EOF
