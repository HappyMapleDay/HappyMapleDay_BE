name: Deploy to Dev Environment

on:
  push:
    branches: [ dev ]

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # ліҖкІҪлҗң нҢҢмқј лӘ©лЎқ к°Җм ёмҳӨкё°
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v44
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gradle мқҳмЎҙм„ұ мәҗмӢң м¶”к°Җ
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew build -x test
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
#    - name: Set up Docker Build Cache
#      uses: actions/cache@v3
#      with:
#        path: /tmp/.buildx-cache
#        key: ${{ runner.os }}-buildx-${{ github.ref }}
#        restore-keys: |
#          ${{ runner.os }}-buildx-
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Docker images (Dev)
      run: |
        # ARM64 н”Ңлһ«нҸјмңјлЎң л№Ңл“ң (QEMUлҘј нҶөн•ң м—җл®¬л Ҳмқҙм…ҳ)
        # мҶҢл¬ёмһҗлЎң ліҖнҷҳн•ҳм—¬ Docker tag к·ңм№ҷ мӨҖмҲҳ
        REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        # boss-serviceм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "boss-service/") -gt 0 ]]; then
          echo "Building boss-service..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-boss:dev -f ./boss-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # character-serviceм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "character-service/") -gt 0 ]]; then
          echo "Building character-service..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-character:dev -f ./character-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # gatewayм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "gateway/") -gt 0 ]]; then
          echo "Building gateway..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-gateway:dev -f ./gateway/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # recommendation-serviceм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "recommendation-service/") -gt 0 ]]; then
          echo "Building recommendation-service..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-recommendation:dev -f ./recommendation-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # settlement-serviceм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "settlement-service/") -gt 0 ]]; then
          echo "Building settlement-service..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-settlement:dev -f ./settlement-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # user-serviceм—җ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -c "user-service/") -gt 0 ]]; then
          echo "Building user-service..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-user:dev -f ./user-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi

        # common лӘЁл“ҲмқҙлӮҳ м„Өм • нҢҢмқјмқҙ ліҖкІҪлҗң кІҪмҡ° лӘЁл“  м„ңл№„мҠӨ л№Ңл“ң
        if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" && $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -cE "^(common/|build.gradle|settings.gradle|docker-compose.yml|\.github/)") -gt 0 ]]; then
          echo "Common files changed - building all services..."
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-boss:dev -f ./boss-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-character:dev -f ./character-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-gateway:dev -f ./gateway/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-recommendation:dev -f ./recommendation-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-settlement:dev -f ./settlement-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
          docker buildx build --platform linux/arm64 -t ghcr.io/${REPO_NAME}/happymapleday-user:dev -f ./user-service/Dockerfile . --cache-from type=gha --cache-to type=gha,mode=max --push &
        fi
        
        # лӘЁл“  л№Ңл“ң мҷ„лЈҢ лҢҖкё°
        wait
        
#        # мәҗмӢң м •лҰ¬
#        rm -rf /tmp/.buildx-cache
#        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        
    - name: Setup SSH (Dev)
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.OCI_SSH_PRIVATE_KEY_DEV }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.OCI_APP_IP_DEV }} >> ~/.ssh/known_hosts
        
    - name: Deploy to OCI via SSH (Dev)
      run: |
        # мҶҢл¬ёмһҗлЎң ліҖнҷҳн•ҳм—¬ Docker нғңк·ё к·ңм№ҷ мӨҖмҲҳ
        REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "Repository name: ${REPO_NAME}"
        
        ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_SSH_USER_DEV }}@${{ secrets.OCI_APP_IP_DEV }} << EOF
          # GitHub Container Registry лЎңк·ёмқё
          echo "${{ secrets.DOCKER_REGISTRY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
          # [н•өмӢ¬ мҲҳм •] curl лҢҖмӢ  gitмңјлЎң н”„лЎңм қнҠё м „мІҙлҘј кҙҖлҰ¬н•©лӢҲлӢӨ.
          # /app л””л үнҶ лҰ¬к°Җ м—Ҷмңјл©ҙ мөңмҙҲ cloneмқ„ мҲҳн–үн•©лӢҲлӢӨ.
         if [ ! -d "/app/.git" ]; then
            echo "/app is not a valid git repository or does not exist. Re-cloning..."
            # нҳ№мӢңлқјлҸ„ лӮЁм•„мһҲмқ„ мҲҳ мһҲлҠ” л№„м •мғҒм Ғмқё /app л””л үнҶ лҰ¬лҘј лЁјм Җ мӮӯм ң
            sudo rm -rf /app
            # м ҖмһҘмҶҢлҘј мғҲлЎң clone
            git clone https://github.com/${{ github.repository }}.git ~/app_temp
            sudo mv ~/app_temp /app
            cd /app
          else
            echo "/app is a valid git repository. Pulling latest changes..."
            cd /app
            git pull origin dev
          fi
        
          echo "Creating .env file on the server..."
          echo "DB_HOST=${{ secrets.DB_HOST }}" > ./.env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> ./.env
          echo "DB_NAME_PREFIX=${{ secrets.DB_NAME_PREFIX }}" >> ./.env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> ./.env
          echo "BOSS_DB_PASSWORD=${{ secrets.BOSS_DB_PASSWORD }}" >> ./.env
          echo "USER_DB_PASSWORD=${{ secrets.USER_DB_PASSWORD }}" >> ./.env
          echo "CHAR_DB_PASSWORD=${{ secrets.CHAR_DB_PASSWORD }}" >> ./.env
          echo "SETTLE_DB_PASSWORD=${{ secrets.SETTLE_DB_PASSWORD }}" >> ./.env
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> ./.env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> ./.env
          echo "OCI_NAMESPACE=${{ secrets.OCI_NAMESPACE }}" >> ./.env
          echo "OCI_BUCKET_NAME=${{ secrets.OCI_BUCKET_NAME }}" >> ./.env
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> ./.env
          echo "OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}" >> ./.env
          echo "OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}" >> ./.env
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> ./.env
          echo "OCI_PRIVATE_KEY_PATH=${{ secrets.OCI_PRIVATE_KEY_PATH }}" >> ./.env

          echo ".env file created successfully."
        
          # кё°мЎҙ м»Ён…Ңмқҙл„Ҳ мӨ‘м§Җ л°Ҹ м ңкұ° (мғҲлЎң л°°нҸ¬н•ҳкё° м „ м •лҰ¬)
          docker-compose down
        
          # GitHub Container Registryм—җм„ң мөңмӢ  мқҙлҜём§Җ лӢӨмҡҙлЎңл“ң (мқҙ л¶Җл¶„мқҖ кё°мЎҙкіј лҸҷмқј)
          REPO_NAME_LOWER="${{ github.repository }}"
          REPO_NAME_LOWER=\$(echo "\${REPO_NAME_LOWER}" | tr '[:upper:]' '[:lower:]')
        
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-boss:dev
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-character:dev
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-gateway:dev
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-recommendation:dev
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-settlement:dev
          docker pull ghcr.io/\${REPO_NAME_LOWER}/happymapleday-user:dev
        
          # мқҙлҜём§Җ нғңк·ё ліҖкІҪ (мқҙ л¶Җл¶„мқҖ кё°мЎҙкіј лҸҷмқј)
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-boss:dev happymapleday-boss:latest
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-character:dev happymapleday-character:latest
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-gateway:dev happymapleday-gateway:latest
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-recommendation:dev happymapleday-recommendation:latest
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-settlement:dev happymapleday-settlement:latest
          docker tag ghcr.io/\${REPO_NAME_LOWER}/happymapleday-user:dev happymapleday-user:latest
        
          # нҳ„мһ¬ л””л үнҶ лҰ¬мҷҖ нҢҢмқј мЎҙмһ¬ нҷ•мқё
          pwd
          ls -la monitoring/
          ls -la monitoring/prometheus/
          ls -la monitoring/loki/
          ls -la monitoring/promtail/
          
          # м»Ён…Ңмқҙл„Ҳ мӢңмһ‘ (мқҙм ң monitoring л””л үнҶ лҰ¬мҷҖ м„Өм • нҢҢмқјмқҙ лӘЁл‘җ мЎҙмһ¬н•ҳлҜҖлЎң м—җлҹ¬ м—Ҷмқҙ мӢӨн–үлҗ©лӢҲлӢӨ.)
          docker-compose up -d
        
          # л°°нҸ¬ мғҒнғң нҷ•мқё
          docker-compose ps
          echo "Dev Deployment completed successfully!"
        EOF
