name: Deploy to OCI

on:
  push:
    branches: [ main, dev ]


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew build -x test
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Docker images (Dev)
      if: github.ref == 'refs/heads/dev'
      run: |
        # ARM64 플랫폼으로 빌드 (QEMU를 통한 에뮬레이션)
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-admin:dev ./admin-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-boss:dev ./boss-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-character:dev ./character-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-gateway:dev ./gateway/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-recommendation:dev ./recommendation-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-settlement:dev ./settlement-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-user:dev ./user-service/ --push
        
    - name: Build and push Docker images (Prod)
      if: github.ref == 'refs/heads/main'
      run: |
        # ARM64 플랫폼으로 빌드 (QEMU를 통한 에뮬레이션)
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-admin:latest ./admin-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-boss:latest ./boss-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-character:latest ./character-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-gateway:latest ./gateway/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-recommendation:latest ./recommendation-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-settlement:latest ./settlement-service/ --push
        docker buildx build --platform linux/arm64 -t ghcr.io/${{ github.repository }}/happymapleday-user:latest ./user-service/ --push
        
    - name: Setup SSH (Dev)
      if: github.ref == 'refs/heads/dev'
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.OCI_SSH_PRIVATE_KEY_DEV }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.OCI_APP_IP_DEV }} >> ~/.ssh/known_hosts
        
    - name: Setup SSH (Prod)
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.OCI_SSH_PRIVATE_KEY_PROD }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.OCI_APP_IP_PROD }} >> ~/.ssh/known_hosts
        
    - name: Deploy to OCI via SSH (Dev)
      if: github.ref == 'refs/heads/dev'
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_SSH_USER_DEV }}@${{ secrets.OCI_APP_IP_DEV }} << EOF
          # 애플리케이션 디렉토리로 이동
          cd /app
          
          # docker-compose.yml 다운로드
          curl -o docker-compose.yml https://raw.githubusercontent.com/HappyMapleDay/HappyMapleDay_BE/dev/docker-compose.yml
          
          # 기존 컨테이너 중지
          docker-compose down
          
          # GitHub Container Registry에서 최신 이미지 다운로드 (dev 태그)
          docker pull ghcr.io/${{ github.repository }}/happymapleday-admin:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-boss:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-character:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-gateway:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-recommendation:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-settlement:dev
          docker pull ghcr.io/${{ github.repository }}/happymapleday-user:dev
          
          # 이미지 태그 변경 (docker-compose.yml과 일치시키기)
          docker tag ghcr.io/${{ github.repository }}/happymapleday-admin:dev happymapleday-admin:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-boss:dev happymapleday-boss:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-character:dev happymapleday-character:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-gateway:dev happymapleday-gateway:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-recommendation:dev happymapleday-recommendation:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-settlement:dev happymapleday-settlement:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-user:dev happymapleday-user:latest
          
          # 컨테이너 시작
          docker-compose up -d
          
          # 배포 상태 확인
          docker-compose ps
          echo "Dev Deployment completed successfully!"
        EOF
        
    - name: Deploy to OCI via SSH (Prod)
      if: github.ref == 'refs/heads/main'
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_SSH_USER_PROD }}@${{ secrets.OCI_APP_IP_PROD }} << EOF
          # 애플리케이션 디렉토리로 이동
          cd /app
          
          # docker-compose.yml 다운로드
          curl -o docker-compose.yml https://raw.githubusercontent.com/HappyMapleDay/HappyMapleDay_BE/main/docker-compose.yml
          
          # 기존 컨테이너 중지
          docker-compose down
          
          # GitHub Container Registry에서 최신 이미지 다운로드 (latest 태그)
          docker pull ghcr.io/${{ github.repository }}/happymapleday-admin:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-boss:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-character:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-gateway:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-recommendation:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-settlement:latest
          docker pull ghcr.io/${{ github.repository }}/happymapleday-user:latest
          
          # 이미지 태그 변경 (docker-compose.yml과 일치시키기)
          docker tag ghcr.io/${{ github.repository }}/happymapleday-admin:latest happymapleday-admin:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-boss:latest happymapleday-boss:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-character:latest happymapleday-character:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-gateway:latest happymapleday-gateway:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-recommendation:latest happymapleday-recommendation:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-settlement:latest happymapleday-settlement:latest
          docker tag ghcr.io/${{ github.repository }}/happymapleday-user:latest happymapleday-user:latest
          
          # 컨테이너 시작
          docker-compose up -d
          
          # 배포 상태 확인
          docker-compose ps
          echo "Prod Deployment completed successfully!"
        EOF

