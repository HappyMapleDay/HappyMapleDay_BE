spring:
  application:
    name: boss-service
  datasource:
    url: jdbc:mysql://localhost:3306/happy_maple_day_master?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8081

logging:
  level:
    com.happymapleday.boss: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics 

# 마스터 데이터 관리 설정
master-data:
  boss:
    cache-ttl: 86400  # 24시간 캐싱
  item:
    cache-ttl: 3600   # 1시간 캐싱 