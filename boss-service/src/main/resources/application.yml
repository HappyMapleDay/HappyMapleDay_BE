spring:
  application:
    name: boss-service
  cache:
    type: caffeine
    cache-names: bossList,bossPresetList,bossDropItems
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=24h
  datasource:
    url: jdbc:mysql://${DB_HOST:172.16.2.136}:${DB_PORT:3306}/${DB_NAME_PREFIX:happy_maple_day_dev_}boss?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
    username: ${DB_USERNAME:appuser}
    password: ${BOSS_DB_PASSWORD:happymapleday!0619}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      data-locations: classpath:data.sql

server:
  port: 8081

logging:
  level:
    com.happymapleday.boss: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always 

# 마스터 데이터 관리 설정
master-data:
  boss:
    cache-ttl: 86400  # 24시간 캐싱
  item:
    cache-ttl: 3600   # 1시간 캐싱

---
# 로컬 개발용 H2 데이터베이스 설정
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:boss_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console 