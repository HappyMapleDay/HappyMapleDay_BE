server:
  port: 8083

spring:
  application:
    name: character-service
  
  # 캐시 설정
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1h

  # 데이터베이스 설정
  datasource:
    url: jdbc:mysql://${DB_HOST:172.16.2.136}:${DB_PORT:3306}/${DB_NAME_PREFIX:happy_maple_day_dev_}character?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:appuser}
    password: ${CHAR_DB_PASSWORD:happymapleday!0619}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# 넥슨 API 설정
nexon:
  api:
    base-url: https://open.api.nexon.com/maplestory/v1
    master-key: ${NEXON_API_MASTER_KEY:} # 환경변수에서 마스터키 가져오기 (기본값: 빈 문자열)

logging:
  level:
    com.happymapleday.character: DEBUG 