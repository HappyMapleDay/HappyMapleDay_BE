server:
  port: 8083

spring:
  application:
    name: character-service
  
  # 캐시 설정
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1h

  # 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:characterdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  h2:
    console:
      enabled: true

# 넥슨 API 설정
nexon:
  api:
    base-url: https://open.api.nexon.com/maplestory/v1
    master-key: ${NEXON_API_MASTER_KEY:} # 환경변수에서 마스터키 가져오기 (기본값: 빈 문자열)

logging:
  level:
    com.happymapleday.character: DEBUG 