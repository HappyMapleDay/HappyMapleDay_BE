version: '3.8'

services:
  boss-service:
    image: ${ECR_REGISTRY}/happymapleday/boss-service:${TAG:-latest}
    container_name: boss-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/happy_maple_day_boss?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${BOSS_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${BOSS_DB_PASSWORD}
    ports:
      - "8081:8081"
    restart: unless-stopped

  user-service:
    image: ${ECR_REGISTRY}/happymapleday/user-service:${TAG:-latest}
    container_name: user-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
    ports:
      - "8082:8082"
    restart: unless-stopped

  character-service:
    image: ${ECR_REGISTRY}/happymapleday/character-service:${TAG:-latest}
    container_name: character-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/happy_maple_day_character?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${CHAR_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${CHAR_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_USER_SERVICE_URL=http://user-service:8082
    ports:
      - "8083:8083"
    restart: unless-stopped

  settlement-service:
    image: ${ECR_REGISTRY}/happymapleday/settlement-service:${TAG:-latest}
    container_name: settlement-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/happy_maple_day_settlement?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${SETTLE_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${SETTLE_DB_PASSWORD}
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
      - SERVICES_USER_SERVICE_URL=http://user-service:8082
    ports:
      - "8084:8084"
    restart: unless-stopped

  recommendation-service:
    image: ${ECR_REGISTRY}/happymapleday/recommendation-service:${TAG:-latest}
    container_name: recommendation-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
      - SERVICES_SETTLEMENT_SERVICE_URL=http://settlement-service:8084
    ports:
      - "8085:8085"
    restart: unless-stopped

  history-service:
    image: ${ECR_REGISTRY}/happymapleday/history-service:${TAG:-latest}
    container_name: history-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/happy_maple_day_history?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${HISTORY_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${HISTORY_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SERVICES_SETTLEMENT_SERVICE_URL=http://settlement-service:8084
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
    ports:
      - "8086:8086"
    restart: unless-stopped

  admin-service:
    image: ${ECR_REGISTRY}/happymapleday/admin-service:${TAG:-latest}
    container_name: admin-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/happy_maple_day_admin?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${ADMIN_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${ADMIN_DB_PASSWORD}
      - SERVICES_USER_SERVICE_URL=http://user-service:8082
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_SETTLEMENT_SERVICE_URL=http://settlement-service:8084
      - SERVICES_RECOMMENDATION_SERVICE_URL=http://recommendation-service:8085
      - SERVICES_HISTORY_SERVICE_URL=http://history-service:8086
    ports:
      - "8087:8087"
    restart: unless-stopped

  gateway:
    image: ${ECR_REGISTRY}/happymapleday/gateway:${TAG:-latest}
    container_name: gateway
    depends_on:
      - user-service
      - character-service
      - boss-service
      - settlement-service
      - recommendation-service
      - history-service
      - admin-service
    env_file:
      - env/prod.env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8080:8080"
    restart: unless-stopped


