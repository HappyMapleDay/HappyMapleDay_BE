version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: happymapleday-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: happymapleday
      MYSQL_USER: happymapleday
      MYSQL_PASSWORD: happymapleday123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

volumes:
  mysql_data: 