version: '3.8'

services:
  # Redis (ARM64 compatible)
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: happymapleday-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 애플리케이션 서비스들 (환경변수로 구분)
  boss-service:
    image: happymapleday-boss:latest
    platform: linux/arm64
    container_name: boss-service
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}boss?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${BOSS_DB_PASSWORD}
      - SQL_INIT_MODE=${SQL_INIT_MODE:-never}
      - OCI_NAMESPACE=${OCI_NAMESPACE}
      - OCI_BUCKET_NAME=${OCI_BUCKET_NAME}
      - OCI_REGION=${OCI_REGION}
      - OCI_FOLDER_PREFIX=${OCI_FOLDER_PREFIX:-dev}
      - OCI_USER_OCID=${OCI_USER_OCID}
      - OCI_TENANCY_OCID=${OCI_TENANCY_OCID}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_PRIVATE_KEY_PATH=${OCI_PRIVATE_KEY_PATH}
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  user-service:
    image: happymapleday-user:latest
    platform: linux/arm64
    container_name: user-service
    depends_on:
      boss-service:
        condition: service_healthy
      character-service:
        condition: service_healthy
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}user?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${USER_DB_PASSWORD}
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  character-service:
    image: happymapleday-character:latest
    platform: linux/arm64
    container_name: character-service
    depends_on:
      - redis
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}character?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${CHAR_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_USER_SERVICE_URL=http://user-service:8082
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  settlement-service:
    image: happymapleday-settlement:latest
    platform: linux/arm64
    container_name: settlement-service
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}settlement?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SETTLE_DB_PASSWORD}
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
      - SERVICES_USER_SERVICE_URL=http://user-service:8082
    ports:
      - "8084:8084"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  recommendation-service:
    image: happymapleday-recommendation:latest
    platform: linux/arm64
    container_name: recommendation-service
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
      - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
      - SERVICES_SETTLEMENT_SERVICE_URL=http://settlement-service:8084
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # admin-service:
  #   image: happymapleday-admin:latest
  #   platform: linux/arm64
  #   container_name: admin-service
  #   environment:
  #     - TZ=Asia/Seoul
  #     - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}admin?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
  #     - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
  #     - SPRING_DATASOURCE_PASSWORD=${ADMIN_DB_PASSWORD}
  #     - SERVICES_USER_SERVICE_URL=http://user-service:8082
  #     - SERVICES_CHARACTER_SERVICE_URL=http://character-service:8083
  #     - SERVICES_BOSS_SERVICE_URL=http://boss-service:8081
  #     - SERVICES_SETTLEMENT_SERVICE_URL=http://settlement-service:8084
  #     - SERVICES_RECOMMENDATION_SERVICE_URL=http://recommendation-service:8085
  #   ports:
  #     - "8087:8087"
  #   restart: unless-stopped

  gateway:
    image: happymapleday-gateway:latest
    platform: linux/arm64
    container_name: gateway
    depends_on:
      user-service:
        condition: service_healthy
      character-service:
        condition: service_healthy
      boss-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      # - admin-service
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.52.0
    platform: linux/arm64
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.1
    platform: linux/arm64
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.1
    platform: linux/arm64
    container_name: promtail
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    platform: linux/arm64
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=happymapleday!0619
    volumes:
      - grafana_data:/var/lib/grafana
      - ${PWD}/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

# MySQL 볼륨 제거 (별도 DB 인스턴스 사용)

volumes:
  prometheus_data:
  loki_data:
  grafana_data: