server:
  port: 8085

spring:
  application:
    name: recommendation-service

# 알고리즘 설정
algorithm:
  optimization:
    max-iterations: 1000
    timeout-seconds: 30
  cache:
    result-ttl: 3600  # 1시간

# 다른 서비스 URL 설정
services:
  boss-service:
    url: http://localhost:8081
  character-service:
    url: http://localhost:8083
  settlement-service:
    url: http://localhost:8084