server:
  port: 8084

spring:
  application:
    name: settlement-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/happy_maple_day_settlement?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # Batch 설정
  batch:
    job:
      enabled: false  # 수동 실행
    jdbc:
      initialize-schema: always

# 스케줄링 설정
scheduling:
  weekly-settlement:
    cron: "0 0 0 * * THU"  # 매주 목요일 자정

# 다른 서비스 URL 설정
services:
  boss-service:
    url: http://localhost:8081
  character-service:
    url: http://localhost:8083
  user-service:
    url: http://localhost:8082 