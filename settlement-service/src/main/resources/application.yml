server:
  port: 8084

spring:
  application:
    name: settlement-service
  
  # 데이터베이스 설정
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_PREFIX}settlement?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${SETTLE_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Batch 설정
  batch:
    job:
      enabled: false  # 수동 실행
    jdbc:
      initialize-schema: always

# 스케줄링 설정
scheduling:
  weekly-settlement:
    cron: "0 0 0 * * THU"  # 매주 목요일 자정

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 다른 서비스 URL 설정
services:
  boss-service:
    url: http://localhost:8081
  character-service:
    url: http://localhost:8083
  user-service:
    url: http://localhost:8082

# 로깅 설정
logging:
  level:
    com.happymapleday.settlement: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

---
# 로컬 개발용 설정
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/happy_maple_day_dev_settlement?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true 