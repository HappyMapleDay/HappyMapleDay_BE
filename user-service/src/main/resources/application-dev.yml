# 개발환경 설정 (H2 인메모리 데이터베이스)
spring:
  # H2 인메모리 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 웹 콘솔 활성화 (http://localhost:8082/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop  # 시작할 때마다 테이블 새로 생성
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# 개발환경 JWT 설정 (토큰 만료시간 짧게)
jwt:
  expiration: 3600000 # 1시간 (개발용으로 짧게)

# 개발환경 로깅 설정 (디버그 레벨)
logging:
  level:
    com.happymapleday: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG 