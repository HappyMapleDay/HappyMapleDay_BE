spring:
  datasource:
    url: jdbc:mysql://localhost:3306/happy_maple_day_user?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

# 운영환경 로깅 설정
logging:
  level:
    com.happymapleday: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN 