server:
  port: 8082

spring:
  application:
    name: user-service
  
  # 캐시 설정
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1h

# JWT 설정
jwt:
  secret: happy-maple-day-jwt-secret-key-for-user-service-authentication
  expiration: 86400000 # 24시간

# 암호화 설정
encryption:
  secret-key: happy-maple-day-encryption-key-12345

# 다른 서비스 URL 설정
services:
  boss-service:
    url: http://localhost:8081
  character-service:
    url: http://localhost:8083 