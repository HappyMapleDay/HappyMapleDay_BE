spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

# JWT 설정 (테스트용)
jwt:
  secret: test-jwt-secret-key-for-testing-purposes-only
  expiration: 86400000

# 암호화 설정 (테스트용)
encryption:
  secret-key: test-encryption-key-for-testing-only

logging:
  level:
    com.happymapleday.user: DEBUG
    org.springframework.security: DEBUG 